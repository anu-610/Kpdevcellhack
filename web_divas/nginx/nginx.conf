# nginx.conf — Reverse proxy for KP Dev Cell
#
# Traffic flow:
#   Browser → nginx:80
#     /api/* → backend:8000  (FastAPI)
#     /*     → frontend:3000 (React, served by nginx in frontend container)
#
# Why nginx in front?
# Without it, the browser would need to know two ports: 5173 for React and
# 8000 for FastAPI. That means CORS headers everywhere and the browser
# making cross-origin requests. With nginx as a single entry point, both
# the frontend and API are served from localhost:80 — same origin, no CORS.

events {}

http {
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;

        # Route all /api/* traffic to FastAPI backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Forward the original IP so the backend can log real client IPs
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route everything else to the React frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;

            # Critical for React Router (client-side routing):
            # If nginx can't find a file, fall back to index.html.
            # Without this, refreshing /team gives a 404 from nginx.
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}