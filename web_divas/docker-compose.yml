version: "3.9"

# KP Dev Cell — Full Stack Docker Composition
# Frontend (React/Vite) → Nginx reverse proxy → Backend (FastAPI) → MongoDB
#
# Why this structure?
# - Nginx handles routing so the frontend never talks to the backend directly.
#   This means CORS is a non-issue and we have one clean entry point.
# - MongoDB over SQL because our data (team members, projects, events) is
#   document-shaped, not relational. A team member has a flexible "skills"
#   array — that's awkward in SQL, natural in Mongo.
# - Each service is in its own container: independent scaling, isolated builds.

services:
  mongo:
    image: mongo:7
    container_name: kpdc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-your_password_here}
      MONGO_INITDB_DATABASE: kpdevcel
    volumes:
      - mongo_data:/data/db
      - ./backend/seed.js:/docker-entrypoint-initdb.d/seed.js:ro
    networks:
      - kpdc_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpdc_api
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-your_password_here}@mongo:27017/kpdevcel?authSource=admin
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_here}
    depends_on:
      - mongo
    networks:
      - kpdc_net
    # Backend is NOT exposed to host — only reachable through nginx

  frontend:
   build:
    context: ./frontend
    dockerfile: Dockerfile
    args:
      - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
      - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
      - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
      - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
      - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
   container_name: kpdc_frontend
   restart: unless-stopped
   networks:
    - kpdc_net

  nginx:
    image: nginx:alpine
    container_name: kpdc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - kpdc_net

volumes:
  mongo_data:

networks:
  kpdc_net:
    driver: bridge
